<div class="qr-backdrop" (click)="close()">
  <div class="qr-modal" (click)="$event.stopPropagation()">

    <button class="qr-modal__close" (click)="close()" aria-label="Close">×</button>

    <div class="qr-modal__header">
      <h2 class="qr-modal__title">Get Service</h2>
      <p class="qr-modal__subtitle">Show this QR code to the company staff</p>
    </div>

    <!-- Connecting -->
    <div *ngIf="connecting" class="qr-modal__state">
      <div class="qr-spinner"></div>
      <p>Connecting...</p>
    </div>

    <!-- Error -->
    <div *ngIf="!connecting && error" class="qr-modal__state qr-modal__state--error">
      <span class="qr-modal__state-icon">⚠</span>
      <p>{{ error }}</p>
      <button class="qr-btn qr-btn--ghost" (click)="close()">Close</button>
    </div>

    <!-- QR Code -->
    <div *ngIf="!connecting && !error" class="qr-modal__body">
      <div class="qr-modal__token-info">
        <span class="qr-modal__company">{{ token.companyName }}</span>
        <span class="qr-modal__product">{{ token.productName }}</span>
        <span class="qr-modal__count">Uses remaining: <strong>{{ token.count }}</strong></span>
      </div>

      <div class="qr-modal__qr-wrap">
        <img [src]="qrDataUrl" alt="Service QR Code" class="qr-modal__qr-img" />
      </div>

      <p class="qr-modal__hint">
        Waiting for company to scan and confirm...
        <span class="qr-modal__waiting-dot"></span>
      </p>
    </div>

    <div *ngIf="!connecting && !error" class="qr-modal__footer">
      <button class="qr-btn qr-btn--ghost" (click)="close()">Cancel</button>
    </div>

  </div>
</div>
